{% extends 'base.html' %}

{% block title %}登录 - 数字图书馆{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">🔐 用户登录</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">登录</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-4">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0">📋 测试账号</h6>
                </div>
                <div class="card-body small">
                    <p class="mb-2"><strong>管理员：</strong>admin / admin123</p>
                    <p class="mb-2"><strong>读者1：</strong>reader1 / pass123</p>
                    <p class="mb-2"><strong>读者2：</strong>reader2 / pass223</p>
                    <p class="mb-2"><strong>读者3：</strong>reader3 / pass323</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
